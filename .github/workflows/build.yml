name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      
    - name: Unzip and Smart Locate Source
      run: |
        # জিপ ফাইল আনজিপ করা হচ্ছে
        unzip -o plugin.zip
        
        # নিখুঁতভাবে src ফোল্ডারটি খুঁজে বের করে মেইন স্ক্রিনে বসানো হচ্ছে
        # এতে ভেতরে যত নামেরই ফোল্ডার থাকুক, কোনো এরর আসবে না
        SRC_DIR=$(find . -type d -name "src" | head -n 1)
        if [ "$SRC_DIR" != "./src" ] && [ ! -z "$SRC_DIR" ]; then
          echo "Found src at $SRC_DIR. Moving to root..."
          mv "$SRC_DIR" ./src
        fi
      
    - name: Build with Gradle
      run: gradle jar --no-daemon
      
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: InvisibleAdPlugin-1.26
        path: build/libs/*.jar
