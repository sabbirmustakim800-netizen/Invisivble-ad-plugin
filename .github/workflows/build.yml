name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      
    - name: Unzip and Fix Folder Structure
      run: |
        # জিপ ফাইলটি আনজিপ করা হচ্ছে
        unzip -o plugin.zip
        
        # যদি src ফোল্ডারটি অন্য কোনো সাব-ফোল্ডারের ভেতরে থাকে, তা খুঁজে মেইন স্ক্রিনে আনা হচ্ছে
        EXTRACTED_SRC=$(find . -type d -name "src" | head -n 1)
        if [ "$EXTRACTED_SRC" != "./src" ] && [ ! -z "$EXTRACTED_SRC" ]; then
          echo "Moving src from $EXTRACTED_SRC to root"
          mv "$EXTRACTED_SRC" ./src
        fi
      
    - name: Build Jar File
      run: gradle jar
      
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: InvisibleAdPlugin-1.26
        path: build/libs/*.jar
